<div class="w-full bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden mt-4">

  <p class="text-sm font-medium text-gray-800 px-5 pt-4 pb-2">Toutes les Régions</p>
  <div class="max-h-[350px] overflow-y-auto">


    @for (region of regions; track region.id) {
    <div class="flex items-center gap-3 px-5 py-3.5 border-t border-gray-100"
    [class.bg-green-100]="activeRegion === region.id"
    
    (click)="onRegionClick(region.id)">
      <div class="w-9 h-9 rounded-full bg-gray-50 border border-gray-100 flex items-center justify-center shrink-0">
        <i class="fa-solid fa-location-dot text-green-700"></i>
      </div>
      <div class="flex-1">
        <p class="text-sm font-medium text-gray-900">{{ region.name }}</p>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-gray-900">{{ meteoParRegion[region.id].main.temp | number:'1.0-1' }} °C</span>
        <span class="w-2.5 h-2.5 rounded-full" [ngClass]="getTempColor(meteoParRegion[region.id].main.temp)"></span>
      </div>
    </div>
    }

  </div>
</div>
